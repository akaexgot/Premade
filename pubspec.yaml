name: premade
description: A gaming duo/squad matching platform with real-time chat.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Supabase
  supabase_flutter: ^2.12.4



  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7

  # Networking
  dio: ^5.3.1
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Validation & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  fpdart: ^0.6.0
  dartz: ^0.10.1

  # Navigation
  go_router: ^13.0.0

  # Image Picker (Profile Avatar)
  image_picker: ^1.0.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.1
  timeago: ^3.5.0

  # Google Sign In
  google_sign_in: ^6.1.5
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
